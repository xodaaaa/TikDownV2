services:
  tikdown:
    build: .
    container_name: tikdown
    ports:
      - "8000:8000"
    volumes:
      - tikdown_data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  tikdown_data:
    name: tikdown_data
